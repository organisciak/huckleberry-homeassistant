log_growth:
  name: Log Growth Measurements
  description: Log child's weight, height, and head circumference measurements.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
    weight:
      name: Weight
      description: Weight measurement (kg for metric, lbs for imperial)
      example: 5.2
      required: false
      selector:
        number:
          min: 0
          max: 50
          step: 0.01
          mode: box
    height:
      name: Height
      description: Height/length measurement (cm for metric, inches for imperial)
      example: 65.5
      required: false
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          mode: box
    head:
      name: Head circumference
      description: Head circumference measurement (cm for metric, inches for imperial)
      example: 42.3
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
    units:
      name: Measurement units
      description: Unit system for measurements
      default: metric
      required: false
      selector:
        select:
          translation_key: measurement_units
          options:
            - metric
            - imperial

log_bottle:
  name: Log Bottle Feeding
  description: Log a bottle feeding with amount and type.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
    amount:
      name: Amount
      description: Amount of bottle feeding (in oz or ml)
      example: 4.0
      required: true
      selector:
        number:
          min: 0.0
          max: 2000.0
          step: 0.5
          mode: box
    bottle_type:
      name: Bottle type
      description: Type of bottle feeding
      required: true
      selector:
        select:
          translation_key: bottle_type
          options:
            - formula
            - breast_milk
            - tube_feeding
            - cow_milk
            - goat_milk
            - soy_milk
            - other
    units:
      name: Units
      description: Measurement units for amount
      default: ml
      required: false
      selector:
        select:
          translation_key: bottle_units
          options:
            - ml
            - oz

log_pump:
  name: Log Pumping
  description: Log a pumping session (total amount is split evenly across both sides).
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
    total_amount:
      name: Total amount
      description: Total amount pumped (in oz or ml)
      example: 120.0
      required: true
      selector:
        number:
          min: 0.0
          max: 2000.0
          step: 0.5
          mode: box
    units:
      name: Units
      description: Measurement units for amount
      default: ml
      required: false
      selector:
        select:
          translation_key: bottle_units
          options:
            - ml
            - oz
    duration:
      name: Duration
      description: Optional pumping duration in seconds
      required: false
      selector:
        number:
          min: 0
          max: 7200
          step: 1
          unit_of_measurement: s
          mode: box
    notes:
      name: Notes
      description: Optional notes
      required: false
      selector:
        text:

start_sleep:
  name: Start Sleep
  description: Start a new sleep session.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
pause_sleep:
  name: Pause Sleep
  description: Pause the active sleep session without completing it.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
resume_sleep:
  name: Resume Sleep
  description: Resume a paused sleep session.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
cancel_sleep:
  name: Cancel Sleep
  description: Cancel the current sleep session (no interval saved).
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
complete_sleep:
  name: Complete Sleep
  description: Complete current sleep and save interval to history.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry

start_nursing:
  name: Start Nursing
  description: Start a nursing (breastfeeding) session on the specified side.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
    side:
      description: Which side to start on (left or right)
      example: left
      name: Side
      default: left
      required: false
      selector:
        select:
          translation_key: nursing_side
          options:
            - left
            - right

pause_nursing:
  name: Pause Nursing
  description: Pause the active nursing session.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry

resume_nursing:
  name: Resume Nursing
  description: Resume a paused nursing session.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
    side:
      description: Side to resume on (optional, resumes on last active side if omitted)
      example: left
      name: Side
      required: false
      selector:
        select:
          translation_key: nursing_side
          options:
            - left
            - right

switch_nursing_side:
  name: Switch Nursing Side
  description: Switch between left and right side during a nursing session.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry

cancel_nursing:
  name: Cancel Nursing
  description: Cancel current nursing session (no history saved).
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry

complete_nursing:
  name: Complete Nursing
  description: Complete current nursing session and save to history.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry

log_diaper_pee:
  name: Log Diaper - Pee
  description: Log a diaper change with pee only.
  fields:
    device_id:
      name: Child device
      description: Select child device
      required: true
      selector:
        device:
          integration: huckleberry
    pee_amount:
      name: Pee amount
      description: Amount of pee (shows indicator in app)
      required: false
      selector:
        select:
          translation_key: diaper_amount
          options:
            - little
            - medium
            - big
    diaper_rash:
      name: Diaper rash
      description: Baby has diaper rash
      required: false
      selector:
        boolean:
    notes:
      name: Notes
      description: Optional notes about this diaper change
      required: false
      example: Changed after feeding
      selector:
        text:

